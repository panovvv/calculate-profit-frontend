<mat-toolbar class="app-header">
  <span class="brand">DACHSER</span>
  <span class="subtitle">Intelligent Logistics</span>
  <span class="spacer"></span>
  <span class="page-title">Calculate Profit</span>
  @if (auth.isAuthenticated()) {
    <span class="user"
      >Signed in as <strong>{{ auth.username() }}</strong></span
    >
    <button mat-stroked-button (click)="logout()">Sign out</button>
  }
</mat-toolbar>

<main>
  <router-outlet />
</main>
